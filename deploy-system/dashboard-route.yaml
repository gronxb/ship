apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-deploy-dashboard
  namespace: ship-system
  labels:
    ship.local/tailscale-only: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ship-tailscale
      namespace: ship-system
  hostnames:
    - k8s.example.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: ship-dashboard-proxy
          port: 80
