apiVersion: apps/v1
kind: Deployment
metadata:
  name: ship-dashboard-proxy
  namespace: ship-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ship-dashboard-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ship-dashboard-proxy
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
      volumes:
        - name: caddy-config
          configMap:
            name: ship-dashboard-proxy-caddy
---
apiVersion: v1
kind: Service
metadata:
  name: ship-dashboard-proxy
  namespace: ship-system
spec:
  selector:
    app.kubernetes.io/name: ship-dashboard-proxy
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
