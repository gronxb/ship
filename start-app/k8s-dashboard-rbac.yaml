apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-dashboard
  namespace: ship-services
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-dashboard-reader
  namespace: ship-services
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-dashboard-reader
  namespace: ship-services
subjects:
  - kind: ServiceAccount
    name: k8s-dashboard
    namespace: ship-services
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-dashboard-reader
