name: Feature request
description: Suggest a scoped improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What deployment or operations problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: exposure
    attributes:
      label: Exposure mode
      options:
        - Tailscale-only
        - Internet
        - Both
        - Not applicable
    validations:
      required: true
